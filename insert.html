<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exercise 7</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10">

    <div id="card" class="bg-white rounded-2xl shadow p-6 max-w-sm">
      <h2 class="text-lg font-bold text-gray-800 mb-2">My Card</h2>
    </div>

    <script>
        const build = document.getElementById("card");
      build.textContent="This paragraph was added by JavaScript.";

      build.classList.add("text-gray-500", "text-sm", "mt-2" )

       build.appendChild("build");
      
    </script>

  </body>
</html>
